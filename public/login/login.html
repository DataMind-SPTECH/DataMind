<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login">
        <a href="../Home/Home.html"><img src="../assets/logoBranco.png" alt=""></a>
        <H1>Login</H1>
        <div class="input-box">

            <p>E-mail</p>
            <div class="input">
                <div>
                    <img src="../assets/e-mail.png" alt="">
                </div>
                <input type="text" id="email_input">
            </div>
            <p>Senha</p>
            <div class="input">
                <div>
                    <img src="../assets/fechar.png" alt="">
                </div>
                <input type="password" id="inputSenha">
                <div id="olho">
                    <img src="../assets/olho-aberto.png" alt="" id="olho-aberto">
                </div>
            </div>
        </div>
        <button onclick="autenticar()">Entrar</button>

        <div class="esquerda">
            <div id="div_paiAlertas">
                <div id="div_alertasValidacao"></div>
            </div>
        </div>

        <small>Ainda não tem uma conta? <a href="../cadastroRepresentante.html">Clique aqui.</a></small>
    </div>
    <div class="login-image">

    </div>
</body>

</html>

<script>

    let olho = document.getElementById("olho")
    let senha = inputSenha

    olho.addEventListener("click", function () {
        if (document.getElementById("olho-aberto")) {
            olho.innerHTML = "";
            olho.innerHTML = '<img src="../assets/olho-fechado.png" alt="" id="olho-fechado">';
            senha.setAttribute("type", "text")
        } else {
            olho.innerHTML = "";
            olho.innerHTML = '<img src="../assets/olho-aberto.png" alt="" id="olho-aberto">';
            senha.setAttribute("type", "password")
        }

    })

</script>
<script>
    function autenticar() {
        var email = document.getElementById("email_input").value;
        var senha = document.getElementById("inputSenha").value;

        if (email == "" || senha == "") {
            div_paiAlertas.style.display = 'block';
            div_alertasValidacao.innerHTML = "Preencha todos os campos"
            return false;
        } else {
            closeModal()
            div_paiAlertas.style.display = 'none';
        }

        console.log("FORM LOGIN: ", email);
        console.log("FORM SENHA: ", senha);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: email,
                senhaServer: senha
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                window.alert("Você será redirecionado para a parte premium deste site");
                console.log(resposta);
                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.idfuncionario;

                    setTimeout(function () {
                        window.location.href = "../dashboard/dashboard_inicial.html";
                    }, 1000); // apenas para exibir o loading
                });

            } else {
                window.alert("Email ou Senha inválidos, tente novamente ou se for novo cadastre-se");
                console.log("Houve um erro ao tentar realizar o login!");
                window.location = "login.html";

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        });

        return false;
    }

    function closeModal() {
        div_paiAlertas.style.display = 'none';
    }
</script>
